<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto;">
  <h2 style="color: #1e293b;">You have been invited to SkillSpell</h2>
  <p style="color: #475569; font-size: 16px;">{{inviterName}} has invited you to join <strong>{{orgName}}</strong> on SkillSpell.</p>
  <p style="margin: 32px 0;">
    <a href="{{inviteLink}}" style="display: inline-block; padding: 12px 32px; background-color: #4f46e5; color: #ffffff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 16px;">
      Accept Invitation
    </a>
  </p>
  <p style="color: #64748b; font-size: 14px;">This invitation link expires in <strong>1 hour</strong>.</p>
  <hr style="border: none; border-top: 1px solid #e2e8f0; margin: 24px 0;" />
  <p style="color: #94a3b8; font-size: 12px;">If you did not expect this invitation, you can safely ignore this email.</p>
</div>
