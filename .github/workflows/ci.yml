name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Non-blocking: the existing codebase has known @typescript-eslint debt.
      # Surfaces lint output without failing the build. Tighten to blocking once
      # the backlog is cleared.
      - name: Lint (informational)
        run: npm run lint
        continue-on-error: true
